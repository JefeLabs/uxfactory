name: Weekly npm publish

# Sunday evening (US): 01:00 UTC Monday = 5pm PT / 8pm ET Sunday.
# Changesets-driven: pending .changeset/*.md files declare what ships and at
# which semver level; `changeset version` applies bumps + changelogs (and
# patch-bumps workspace dependents), `changeset publish` publishes whatever
# isn't on the registry yet and tags per package. No pending changesets →
# exits green. private:true packages never publish.
on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Version + build + test, but do not publish/tag/push"
        type: boolean
        default: false

permissions:
  contents: write   # push version commit + per-package tags
  id-token: write   # npm provenance attestation

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect pending changesets
        id: pending
        run: |
          COUNT=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Pending changesets: ${COUNT}"

      - name: Nothing to publish
        if: steps.pending.outputs.count == '0'
        run: echo "No pending changesets — exiting green."

      - name: Apply versions and changelogs
        if: steps.pending.outputs.count != '0'
        run: pnpm exec changeset version

      - name: Build all packages
        if: steps.pending.outputs.count != '0'
        run: pnpm -r build

      - name: Test published packages
        if: steps.pending.outputs.count != '0'
        run: pnpm --filter @uxfactory/spec --filter @uxfactory/gate --filter @uxfactory/bridge --filter @uxfactory/cli test

      - name: Publish to npm
        if: steps.pending.outputs.count != '0' && !inputs.dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: pnpm exec changeset publish

      - name: Commit version bumps and push with tags
        if: steps.pending.outputs.count != '0' && !inputs.dry-run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .changeset packages/*/package.json packages/*/CHANGELOG.md pnpm-lock.yaml
          git commit -m "chore(release): version packages [skip ci]"
          git push origin HEAD:main --follow-tags

      - name: Dry-run summary
        if: steps.pending.outputs.count != '0' && inputs.dry-run
        run: |
          echo "DRY RUN — versions that would ship:"
          git diff --stat packages/*/package.json
          git diff packages/*/package.json | grep -E '^[+-]\s*"version"' || true
